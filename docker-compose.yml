name: mkg-local

services:
  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./data/storage:/app/data/storage
    depends_on:
      - neo4j
      - postgres
      - redis
      - qdrant

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    env_file: .env
    volumes:
      - ./data/storage:/app/data/storage
    depends_on:
      - neo4j
      - postgres
      - redis
      - qdrant

  analytics:
    build:
      context: .
      dockerfile: services/analytics/Dockerfile
    env_file: .env
    depends_on:
      - neo4j
      - postgres
      - redis
      - qdrant

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mkg}
      POSTGRES_USER: ${POSTGRES_USER:-mkg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-changeme}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data

volumes:
  pgdata:
  qdrantdata:
  neo4jdata:
