name: mkg-local

services:
  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    env_file: .env
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data/storage:/app/data/storage
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      AGENTS_URL: http://agents:8010
      AGENTS_TIMEOUT_SECONDS: ${AGENTS_TIMEOUT_SECONDS:-30}
      AUTO_EXTRACT_AFTER_INGEST: "true"

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    env_file: .env
    restart: unless-stopped
    volumes:
      - ./data/storage:/app/data/storage
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      AUTO_EXTRACT_AFTER_INGEST: "true"

  analytics:
    build:
      context: .
      dockerfile: services/analytics/Dockerfile
    env_file: .env
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  agents:
    build:
      context: .
      dockerfile: services/agents/Dockerfile
    env_file: .env
    restart: unless-stopped
    environment:
      GATEWAY_URL: http://gateway:8000
      AGENTS_TIMEOUT_SECONDS: ${AGENTS_TIMEOUT_SECONDS:-45}
      AGENTS_LLM_MODEL: ${AGENTS_LLM_MODEL:-yandexgpt-5-lite}
      AGENTS_LLM_MAX_OUTPUT_TOKENS: ${AGENTS_LLM_MAX_OUTPUT_TOKENS:-1200}
      AGENTS_MAX_DOCS: ${AGENTS_MAX_DOCS:-5}
      AGENTS_SEARCH_LIMIT: ${AGENTS_SEARCH_LIMIT:-6}
      AGENTS_MAX_AGENT_LOOPS: ${AGENTS_MAX_AGENT_LOOPS:-1}
      AGENT_LOOP_MAX_ROUNDS: ${AGENT_LOOP_MAX_ROUNDS:-4}
      AGENTS_MAX_HYPOTHESIS_REFINEMENTS: ${AGENTS_MAX_HYPOTHESIS_REFINEMENTS:-1}
    ports:
      - "8010:8010"
    depends_on:
      - gateway

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mkg}
      POSTGRES_USER: ${POSTGRES_USER:-mkg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mkg}"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-changeme}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  qdrantdata:
  neo4jdata:
