[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "mkg-extraction"
version = "0.1.0"
description = "MKG extraction pipeline: markdown -> entities/facts -> graph payload -> Neo4j"
requires-python = ">=3.10"
dependencies = [
  "mkg-core",
]

[tool.setuptools.packages.find]
where = ["src"]
