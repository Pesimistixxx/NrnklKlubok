[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "mkg-ingestion"
version = "0.1.0"
description = "MKG ingestion pipeline: OCR -> chunk -> clean -> markdown -> diagrams"
requires-python = ">=3.10"
dependencies = [
  "mkg-core",
  "ftfy>=6.2",
  "langdetect>=1.0.9",
  "pymupdf>=1.24",
  "python-docx>=1.1",
  "openpyxl>=3.1",
  "chardet>=5.2",
  "pyyaml>=6.0",
]

[tool.setuptools.packages.find]
where = ["src"]
