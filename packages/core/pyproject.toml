[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "mkg-core"
version = "0.1.0"
description = "MKG core: config and client singletons (Yandex LLM, Neo4j, Qdrant)"
requires-python = ">=3.10"
dependencies = [
  "pydantic>=2.6",
  "pydantic-settings>=2.2",
  "httpx>=0.27",
  "openai>=1.40",
  "neo4j>=5.20",
  "qdrant-client>=1.9",
  "arq>=0.26",
  "asyncpg>=0.29",
]

[tool.setuptools.packages.find]
where = ["src"]
